{% if user.is_authenticated %}
    <aside class="hidden lg:flex flex-col w-56 shrink-0 pt-6 pb-8" style="border-right: 1px solid var(--crow-border);">

      <div class="sidebar-group-label">Навігація</div>
      <a href="{% url 'index' %}" class="sidebar-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
        Головна
      </a>
      <a href="{% url 'predictions:leagues_all_list' %}" class="sidebar-item {% if 'leagues' in request.resolver_match.app_name %}active{% endif %}">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
        Ліги
      </a>


      <div class="sidebar-group-label mt-4">Прогнози</div>

       <a href="{% url 'predictions:leagues_list' %}" class="sidebar-item {% if 'tournaments' in request.resolver_match.app_name %}active{% endif %}">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 013 3h-15a3 3 0 013-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872m5.007 0H9.497m5.007 0a7.454 7.454 0 01-.982-3.172M9.497 14.25a7.454 7.454 0 00.981-3.172M5.25 4.236c-.982.143-1.954.317-2.916.52A6.003 6.003 0 007.73 9.728M5.25 4.236V4.5c0 2.108.966 3.99 2.48 5.228M5.25 4.236V2.721C7.456 2.41 9.71 2.25 12 2.25c2.291 0 4.545.16 6.75.47v1.516M7.73 9.728a6.726 6.726 0 002.748 1.35m8.272-6.842V4.5c0 2.108-.966 3.99-2.48 5.228m2.48-5.492a46.32 46.32 0 012.916.52 6.003 6.003 0 01-5.395 4.972m0 0a6.726 6.726 0 01-2.749 1.35m0 0a6.772 6.772 0 01-3.044 0"/></svg>
        Мої Турніри
      </a>

      <a href="{% url 'predictions:current_round' %}" class="sidebar-item {% if 'predictions' in request.resolver_match.app_name %}active{% endif %}">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/></svg>
        Матчі
      </a>

      <a href="{% url 'index' %}" class="sidebar-item {% if 'leaderboard' in request.resolver_match.app_name %}active{% endif %}">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
        Лідерборд
      </a>

      <div class="mt-auto px-3 pt-6">
        <hr class="gold-rule mb-4" style="opacity: 0.3;" />
        <a href="{% url 'index' %}" class="flex items-center gap-2 no-underline" style="color: var(--text-muted);">
          {% if user.avatar %}
            <img src="{{ user.avatar.url }}" class="w-7 h-7 rounded-full" style="border: 1px solid var(--crow-border);" />
          {% else %}
            <div class="w-7 h-7 rounded-full flex items-center justify-center shrink-0" style="background: var(--crow-overlay); border: 1px solid var(--gold-dark); font-family: 'Playfair Display', serif; color: var(--gold); font-size: 0.75rem; font-weight: 700;">
              {{ user.username|slice:":1"|upper }}
            </div>
          {% endif %}
          <div>
            <div style="font-size: 0.85rem; color: var(--text-primary);">{{ user.username }}</div>
            <div style="font-size: 0.7rem; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 0.1em;">{{ user.get_role_display }}</div>
          </div>
        </a>
      </div>
    </aside>
    {% endif %}
