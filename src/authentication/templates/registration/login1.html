{% extends "base/index.html" %}
{% block content %}
<div class="flex justify-center items-center" style="min-height: 70vh;">
  <div class="card" style="width: 100%; max-width: 420px; padding: 2.5rem; background: var(--crow-surface, #141416); border: 1px solid var(--crow-border, #2A2A2E); border-radius: 8px;">

    <h1 class="font-display" style="text-align:center; color: var(--gold, #C9A84C); font-size: 1.8rem; margin-bottom: 1.5rem;">
      Вхід
    </h1>

    {% if form.errors %}
    <div style="border-left: 3px solid #f87171; padding: .5rem 1rem; margin-bottom: 1rem; background: #f871711a;">
      <p style="color:#f87171; font-size:.85rem;">Невірний логін або пароль.</p>
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div style="margin-bottom: 1.2rem; display:flex; flex-direction:column;">
        <label for="{{ field.id_for_label }}" style="color: var(--text-primary, #eee); font-family:'Crimson Pro', serif; font-size:.9rem; margin-bottom:.4rem;">
          {{ field.label }}
        </label>
        {{ field }}
      </div>
      {% endfor %}

      <input type="hidden" name="next" value="{{ next }}">

      <button type="submit" class="font-body" style="width:100%; padding:.8rem; background: var(--gold, #C9A84C); color:#0D0D0F; font-weight:600; border:none; border-radius:4px; cursor:pointer; transition: background .2s;"
        onmouseover="this.style.background='var(--gold-light, #DFC078)'"
        onmouseout="this.style.background='var(--gold, #C9A84C)'">
        Увійти
      </button>
    </form>

    <p style="text-align:center; margin-top:1.5rem; font-size:.85rem; color: var(--text-muted, #888);">
      Немає акаунту? <a href="{% url 'register' %}" style="color: var(--gold, #C9A84C);">Зареєструватися</a>
    </p>
  </div>
</div>

{% endblock %}
