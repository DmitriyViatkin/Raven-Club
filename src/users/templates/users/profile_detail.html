{% extends "base/index.html" %}

{% block content %}
<div class="profile-container">
    <h1>Профиль игрока: {{ player.username }}</h1>
    
    <div class="profile-info">
        <div class="avatar-container mb-4">
            {% if player.avatar %}
                <img src="{{ player.avatar.url }}" alt="Аватар {{ player.username }}" class="w-32 h-32 rounded-full object-cover border-2 border-[#e5c158]">
            {% else %}
                <div class="w-32 h-32 rounded-full bg-gray-700 flex items-center justify-center border-2 border-gray-600">
                    <svg class="w-16 h-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
            {% endif %}
        </div>
        <p><strong>Email:</strong> {{ player.email }}</p>
        <p><strong>Имя:</strong> {{ player.first_name|default:"Не указано" }}</p>
        <p><strong>Фамилия:</strong> {{ player.last_name|default:"Не указано" }}</p>
    </div>

<div class="flex justify-between items-center mt-6">

            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-colors">
                 <a href="{% url 'user_profile_edit' %}" class="text-gray-600 hover:underline">Змінити профіль</a>
            </button>
        </div>
    </div>
{% endblock %}
